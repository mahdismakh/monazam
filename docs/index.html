<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>منازم‌بات</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jalaali-js@3.3.1/dist/jalaali.min.js"></script>
<style>
:root{
  --bg:#0f1a0f;--card:#1a2518;--border:#2a3d28;
  --accent:#5cb85c;--acc2:#4a9e4a;
  --text:#e8f0e8;--sub:#7a9a7a;
  --danger:#e05555;--warn:#f0c040;--blue:#5bc0de;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Tahoma,sans-serif;display:flex;flex-direction:column;font-size:15px}

/* ── TOP NAV ── */
.topnav{display:flex;border-bottom:2px solid var(--border);background:var(--bg);flex-shrink:0}
.tnb{flex:1;padding:11px 8px 9px;background:none;border:none;border-bottom:2.5px solid transparent;margin-bottom:-2px;color:var(--sub);font-size:13px;font-family:inherit;cursor:pointer;transition:all .2s}
.tnb.active{color:var(--accent);font-weight:700;border-bottom-color:var(--accent)}

/* ── PAGES ── */
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;opacity:0;pointer-events:none;transition:opacity .2s}
.page.show{opacity:1;pointer-events:all}

/* ── FILTER TABS ── */
.ftabs{display:flex;gap:5px;padding:8px 12px;overflow-x:auto;border-bottom:1px solid var(--border);flex-shrink:0}
.ftabs::-webkit-scrollbar{display:none}
.ftab{padding:4px 11px;border-radius:14px;border:1.5px solid var(--border);background:transparent;color:var(--sub);cursor:pointer;white-space:nowrap;font-size:12px;font-family:inherit;transition:all .2s}
.ftab.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}

/* ── SCROLL ── */
.scroll{flex:1;overflow-y:auto;padding:8px 12px 80px}
.scroll::-webkit-scrollbar{width:0}

/* ── TASK CARD ── */
.task{background:var(--card);border-radius:12px;padding:11px 12px;margin-bottom:7px;border:1px solid var(--border);animation:fi .2s}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.task.done{opacity:.4}
.task-row{display:flex;align-items:flex-start;gap:9px}
.chk{width:21px;height:21px;border-radius:6px;border:2px solid var(--accent);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:2px}
.chk.on{background:var(--accent)}
.chk.on::after{content:'✓';color:#fff;font-size:12px;font-weight:700}
.tbody{flex:1;min-width:0}
.ttl{font-size:14px;line-height:1.4;word-break:break-word}
.ttl.done{text-decoration:line-through}
.tmeta{font-size:11px;margin-top:3px;color:var(--sub);display:flex;flex-wrap:wrap;gap:5px}
.tmeta .ov{color:var(--danger)}
.tmeta .td{color:var(--warn)}
.task-acts{display:flex;gap:3px;flex-shrink:0}
.tact{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--sub);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.tact:active{transform:scale(.88)}

/* ── EMPTY / SPINNER ── */
.empty{text-align:center;padding:40px 20px;color:var(--sub);line-height:2.2;font-size:14px}
.spin{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite;margin:40px auto}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── FAB ── */
.fab{position:absolute;bottom:14px;left:16px;width:52px;height:52px;border-radius:26px;background:var(--accent);color:#fff;font-size:28px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(92,184,92,.4);z-index:10;transition:transform .15s}
.fab:active{transform:scale(.91)}

/* ── OVERLAY + SHEET ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;z-index:60;backdrop-filter:blur(3px)}
.overlay.show{display:block}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:20px 20px 0 0;padding:14px 16px 32px;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:61;border-top:1px solid var(--border);max-height:90vh;overflow-y:auto}
.sheet.open{transform:translateY(0)}
.handle{width:34px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 12px}
.sh-ttl{font-size:14px;font-weight:700;margin-bottom:12px}
.lbl{font-size:11px;color:var(--sub);margin-bottom:4px;display:block}
.inp{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;margin-bottom:10px;font-family:inherit}
.inp:focus{outline:none;border-color:var(--accent)}
select.inp{cursor:pointer}
.sh-acts{display:flex;gap:8px;margin-top:4px}
.bsv{flex:1;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:11px;font-size:14px;cursor:pointer;font-weight:600;font-family:inherit}
.bsv:active{background:var(--acc2)}
.bcl{padding:12px 14px;background:var(--border);color:var(--sub);border:none;border-radius:11px;font-size:14px;cursor:pointer;font-family:inherit}

/* ── JALALI CALENDAR PICKER ── */
.date-btn{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--sub);font-size:14px;margin-bottom:0;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-family:inherit;text-align:right}
.date-btn.sel{color:var(--text);border-color:var(--accent)}
.cal-wrap{background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:10px;margin:6px 0 10px;display:none}
.cal-wrap.show{display:block}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-nav{background:none;border:none;color:var(--accent);font-size:20px;cursor:pointer;padding:3px 8px;line-height:1}
.cal-mo{font-size:12px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-wd{font-size:9px;color:var(--sub);text-align:center;padding:3px 0}
.cal-d{aspect-ratio:1;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;border:none;background:transparent;color:var(--text);font-family:inherit;transition:background .12s}
.cal-d:empty{pointer-events:none}
.cal-d.today{color:var(--accent);font-weight:700}
.cal-d.sel{background:var(--accent);color:#fff;font-weight:700}
.cal-d:not(:empty):not(.sel):active{background:var(--border)}
.cal-d.hol{color:var(--danger)}
.cal-wd.cal-fri{color:var(--danger)}

/* ── HABIT TRACKER ── */
.week-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.wnbtn{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 12px;color:var(--sub);cursor:pointer;font-size:12px;font-family:inherit}
.week-lbl{font-size:12px;font-weight:600}
.htbl-wrap{flex:1;overflow:auto;padding:6px 10px 80px}
.htbl{width:100%;border-collapse:collapse;min-width:280px}
.htbl th{font-size:10px;color:var(--sub);padding:5px 2px;text-align:center;font-weight:400}
.htbl th.hname-col{text-align:right;min-width:85px;padding-right:4px}
.htbl td{padding:3px 2px;text-align:center}
.htbl td.hname-cell{text-align:right;font-size:12px;padding:5px 4px 5px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:85px;color:var(--text)}
.hck{width:30px;height:30px;border-radius:7px;border:2px solid var(--border);background:transparent;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:0;transition:all .15s}
.hck.done{background:var(--accent);border-color:var(--accent)}
.hck.done::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.hck.fut{opacity:.3;pointer-events:none}
.hck.today-cell{border-color:var(--accent)}
.today-th{color:var(--accent)!important}
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="topnav">
  <button class="tnb active" data-p="tasks">📌 تسک‌ها</button>
  <button class="tnb" data-p="habits">✅ عادت‌ها</button>
</nav>

<div class="pages">

  <!-- ── PAGE: TASKS ── -->
  <div class="page show" id="p-tasks">
    <div class="ftabs">
      <button class="ftab on" data-f="all">همه</button>
      <button class="ftab" data-f="today">امروز</button>
      <button class="ftab" data-f="week">این هفته</button>
      <button class="ftab" data-f="overdue">معوق 🔴</button>
      <button class="ftab" data-f="done">انجام‌شده ✅</button>
    </div>
    <div class="scroll" id="t-list"><div class="spin"></div></div>
    <button class="fab" id="t-fab">+</button>
  </div>

  <!-- ── PAGE: HABITS ── -->
  <div class="page" id="p-habits">
    <div class="week-nav">
      <button class="wnbtn" id="w-prev">‹ قبل</button>
      <span class="week-lbl" id="w-lbl">...</span>
      <button class="wnbtn" id="w-next">بعد ›</button>
    </div>
    <div class="htbl-wrap" id="h-wrap"><div class="spin"></div></div>
    <button class="fab" id="h-fab">+</button>
  </div>

</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay"></div>

<!-- ADD/EDIT TASK SHEET -->
<div class="sheet" id="task-sheet">
  <div class="handle"></div>
  <div class="sh-ttl" id="t-sh-ttl">تسک جدید</div>
  <label class="lbl">عنوان تسک *</label>
  <input class="inp" id="si-title" placeholder="مثلاً: بررسی وبسایت..." autocomplete="off"/>
  <label class="lbl">ددلاین (شمسی)</label>
  <button class="date-btn" id="date-btn" onclick="toggleCal()">
    <span id="date-txt">انتخاب تاریخ</span><span style="font-size:16px">📅</span>
  </button>
  <div class="cal-wrap" id="cal-wrap">
    <div class="cal-hdr">
      <button class="cal-nav" onclick="calN()">›</button>
      <span class="cal-mo" id="cal-mo"></span>
      <button class="cal-nav" onclick="calP()">‹</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <input type="hidden" id="si-dl"/>
  <label class="lbl">مسئول</label>
  <select class="inp" id="si-assigned">
    <option value="">— بدون مسئول —</option>
  </select>
  <label class="lbl">زمان یادآوری (اعلان به تلگرام)</label>
  <input class="inp" type="time" id="si-reminder"/>
  <div class="sh-acts">
    <button class="bcl" onclick="closeTaskSheet()">لغو</button>
    <button class="bsv" onclick="saveTask()">✓ ذخیره</button>
  </div>
</div>

<!-- ADD HABIT SHEET -->
<div class="sheet" id="hab-sheet">
  <div class="handle"></div>
  <div class="sh-ttl">عادت جدید</div>
  <label class="lbl">نام عادت *</label>
  <input class="inp" id="si-habit" placeholder="مثلاً: ورزش کردن..." autocomplete="off"/>
  <div class="sh-acts">
    <button class="bcl" onclick="closeHabSheet()">لغو</button>
    <button class="bsv" onclick="saveHabit()">✓ ذخیره</button>
  </div>
</div>

<script>
// ══ CONFIG ════════════════════════════════════════════════════════════
const API = 'https://script.google.com/macros/s/AKfycbysc7k8zrVYyqR08byEd5bCcBKjIvuxdDNghjtm1tJ8zCN7uohurTKbusNpwdJLdXX-qA/exec';
const KEY = 'monazam2025secret';
// ════════════════════════════════════════════════════════════════════

const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();
try{tg.setHeaderColor('#0f1a0f');tg.setBackgroundColor('#0f1a0f');}catch(e){}

const MY_ID   = String(tg.initDataUnsafe?.user?.id || '');
const MY_NAME = ((tg.initDataUnsafe?.user?.first_name||'') + ' ' + (tg.initDataUnsafe?.user?.last_name||'')).trim() || 'من';

// ── API helper ────────────────────────────────────────────────────────
async function call(params, timeoutMs=12000){
  const qs = new URLSearchParams({...params, key:KEY});
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), timeoutMs);
  try{
    const r = await fetch(`${API}?${qs}`, {signal:ctrl.signal});
    clearTimeout(timer);
    const j = await r.json();
    if(!j.ok) throw new Error(j.error||'خطای سرور');
    return j.data;
  }catch(e){
    clearTimeout(timer);
    if(e.name==='AbortError') throw new Error('اتصال قطع شد — اینترنت رو چک کن');
    throw e;
  }
}

// ── Jalali conversion (via jalaali-js CDN) ────────────────────────────
const JM=['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
const JDN=['ش','ی','د','س','چ','پ','ج'];

function toJ(gy,gm,gd){return jalaali.toJalaali(gy,gm,gd);}          // → {jy,jm,jd}
function toG(jy,jm,jd){return jalaali.toGregorian(jy,jm,jd);}         // → {gy,gm,gd}
function jDim(jy,jm){return jalaali.jalaaliMonthLength(jy,jm);}
function jDow1(jy,jm){const{gy,gm,gd}=toG(jy,jm,1);return(new Date(gy,gm-1,gd).getDay()+1)%7;} // Sat=0
function pad(n){return String(n).padStart(2,'0');}
function giso(gy,gm,gd){return`${gy}-${pad(gm)}-${pad(gd)}`;}
function jdisp(jy,jm,jd){return`${jy}/${pad(jm)}/${pad(jd)}`;}
function todayJ(){const n=new Date();return toJ(n.getFullYear(),n.getMonth()+1,n.getDate());}
function todayIso(){const n=new Date();return giso(n.getFullYear(),n.getMonth()+1,n.getDate());}
function parseIso(s){if(!s)return null;const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d);dt.setHours(0,0,0,0);return dt;}

// ── تعطیلات رسمی 1405 ────────────────────────────────────────────────
const HOLIDAYS = new Set([
  // نوروز
  '1405/01/01','1405/01/02','1405/01/03','1405/01/04',
  '1405/01/12', // روز جمهوری اسلامی
  '1405/01/13', // سیزده بدر
  // خرداد
  '1405/03/14', // رحلت امام خمینی
  '1405/03/15', // قیام ۱۵ خرداد
  // مرداد
  '1405/05/11', // عید قربان (تقریبی)
  '1405/05/19', // عید غدیر (تقریبی)
  // محرم
  '1405/06/06', // تاسوعا (تقریبی)
  '1405/06/07', // عاشورا (تقریبی)
  // بهمن
  '1405/11/22', // پیروزی انقلاب
  // اسفند
  '1405/12/29', // ملی شدن صنعت نفت
  // ماه‌های قبل ۱۴۰۵
  '1404/12/21', // تولد حضرت علی
]);

function isHoliday(jy,jm,jd){
  return HOLIDAYS.has(`${jy}/${pad(jm)}/${pad(jd)}`);
}
function isFriday(jy,jm,jd){
  const{gy,gm,gd}=toG(jy,jm,jd);
  return new Date(gy,gm-1,gd).getDay()===5; // 5=Friday
}

// ── State ─────────────────────────────────────────────────────────────
let tasks=[], habits=[], users=[];
let taskFilter='all', weekOff=0, editingId=null;
let calJY, calJM, selJY, selJM, selJD, selGreg='';
let habLog={};

const tj=todayJ();
const todayStr=todayIso();
const todayDate=parseIso(todayStr);
const weekEnd=new Date(todayDate);weekEnd.setDate(todayDate.getDate()+7);

// ── Task filter + render ──────────────────────────────────────────────
function filtered(){
  return tasks.filter(t=>{
    const dl=parseIso(t.deadline_greg),done=t.status==='done';
    if(taskFilter==='done')return done;
    if(done)return false;
    if(taskFilter==='all')return true;
    if(taskFilter==='today')return dl&&dl<=todayDate;
    if(taskFilter==='week')return dl&&dl>todayDate&&dl<=weekEnd;
    if(taskFilter==='overdue')return dl&&dl<todayDate;
    return true;
  });
}
function dlCls(g){const d=parseIso(g);if(!d)return'';if(d<todayDate)return'ov';if(d.getTime()===todayDate.getTime())return'td';return'';}

function renderTasks(){
  const items=filtered();
  const msgs={all:'هیچ تسکی ثبت نشده',today:'امروز تسکی نیست',week:'این هفته تسکی نیست',overdue:'تسک معوقی نداری ✅',done:'هنوز تسکی انجام نشده'};
  if(!items.length){document.getElementById('t-list').innerHTML=`<div class="empty">${msgs[taskFilter]||'موردی نیست'}</div>`;return;}
  document.getElementById('t-list').innerHTML=items.map(t=>{
    const done=t.status==='done',cls=dlCls(t.deadline_greg);
    const dl=t.deadline?`<span class="${cls}">📅 ${t.deadline}</span>`:'';
    const who=t.assigned_to?`<span>👤 ${t.assigned_to}</span>`:'';
    const rem=t.reminder_at?`<span>⏰ ${String(t.reminder_at).slice(11,16)}</span>`:'';
    return`<div class="task ${done?'done':''}" id="t${t.id}">
      <div class="task-row">
        <div class="chk ${done?'on':''}" onclick="toggleTask(${t.id})"></div>
        <div class="tbody">
          <div class="ttl ${done?'done':''}">${t.title}</div>
          <div class="tmeta">${dl}${who}${rem}</div>
        </div>
        <div class="task-acts">
          ${!done?`<button class="tact" onclick="openEditTask(${t.id})">✏️</button>`:''}
          <button class="tact" onclick="delTask(${t.id})">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function loadTasks(){
  document.getElementById('t-list').innerHTML='<div class="spin"></div>';
  try{tasks=await call({action:'get_tasks'});renderTasks();}
  catch(e){document.getElementById('t-list').innerHTML=`<div class="empty">❌ ${e.message||'خطا در بارگذاری'}<br><br><button onclick="loadTasks()" style="padding:8px 20px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-family:inherit">🔄 تلاش مجدد</button></div>`;}
}

async function toggleTask(id){
  const t=tasks.find(x=>x.id==id);if(!t||t.status==='done')return;
  t.status='done';renderTasks();
  await call({action:'complete_task',id}).catch(()=>{t.status='pending';renderTasks();});
}

async function delTask(id){
  if(!confirm('این تسک حذف بشه؟'))return;
  tasks=tasks.filter(t=>t.id!=id);renderTasks();
  await call({action:'delete_task',id}).catch(()=>{});
}

// ── Calendar ──────────────────────────────────────────────────────────
function initCal(){calJY=tj.jy;calJM=tj.jm;renderCal();}
function toggleCal(){const w=document.getElementById('cal-wrap');w.classList.toggle('show');if(w.classList.contains('show'))renderCal();}
function calP(){calJM--;if(calJM<1){calJM=12;calJY--;}renderCal();}
function calN(){calJM++;if(calJM>12){calJM=1;calJY++;}renderCal();}

function renderCal(){
  document.getElementById('cal-mo').textContent=`${JM[calJM-1]} ${calJY}`;
  // headers: ش ی د س چ پ ج  (Sat→Fri)
  let h=JDN.map((d,i)=>`<div class="cal-wd${i===6?' cal-fri':''}">${d}</div>`).join('');
  const fd=jDow1(calJY,calJM),nd=jDim(calJY,calJM);
  for(let i=0;i<fd;i++)h+=`<button class="cal-d"></button>`;
  for(let d=1;d<=nd;d++){
    const isT=calJY===tj.jy&&calJM===tj.jm&&d===tj.jd;
    const isS=selJY===calJY&&selJM===calJM&&selJD===d;
    const isHol=isHoliday(calJY,calJM,d)||isFriday(calJY,calJM,d);
    let cls='cal-d';
    if(isS)cls+=' sel';
    else if(isT)cls+=' today';
    if(isHol&&!isS)cls+=' hol';
    h+=`<button class="${cls}" onclick="pickDay(${d})">${d}</button>`;
  }
  document.getElementById('cal-grid').innerHTML=h;
}

function pickDay(d){
  selJY=calJY;selJM=calJM;selJD=d;
  const{gy,gm,gd}=toG(calJY,calJM,d);
  selGreg=giso(gy,gm,gd);
  const disp=jdisp(calJY,calJM,d);
  document.getElementById('si-dl').value=disp;
  document.getElementById('date-txt').textContent=disp;
  document.getElementById('date-btn').classList.add('sel');
  document.getElementById('cal-wrap').classList.remove('show');
  renderCal();
}

function resetDatePicker(){
  selJY=selJM=selJD=undefined;selGreg='';
  document.getElementById('si-dl').value='';
  document.getElementById('date-txt').textContent='انتخاب تاریخ';
  document.getElementById('date-btn').classList.remove('sel');
}

// ── Users dropdown ────────────────────────────────────────────────────
async function loadUsers(){
  try{users=await call({action:'get_users'});}catch(e){users=[];}
  const sel=document.getElementById('si-assigned');
  while(sel.options.length>1)sel.remove(1);
  if(MY_ID){
    sel.appendChild(new Option(`👤 ${MY_NAME||'من'} (من)`,MY_ID));
  }
  (users||[]).forEach(u=>{
    if(String(u.id)===MY_ID)return;
    sel.appendChild(new Option(`👤 ${u.name}`,String(u.id)));
  });
}

// ── Task sheet ────────────────────────────────────────────────────────
function openAddTask(){
  editingId=null;
  document.getElementById('t-sh-ttl').textContent='تسک جدید';
  document.getElementById('si-title').value='';
  document.getElementById('si-assigned').value='';
  document.getElementById('si-reminder').value='';
  document.getElementById('cal-wrap').classList.remove('show');
  resetDatePicker();
  initCal();
  openSheet('task-sheet');
  setTimeout(()=>document.getElementById('si-title').focus(),300);
}

function openEditTask(id){
  const t=tasks.find(x=>x.id==id);if(!t)return;
  editingId=id;
  document.getElementById('t-sh-ttl').textContent='ویرایش تسک';
  document.getElementById('si-title').value=t.title;
  if(t.deadline){
    const p=t.deadline.split('/');
    if(p.length===3){
      selJY=+p[0];selJM=+p[1];selJD=+p[2];selGreg=t.deadline_greg||'';
      calJY=selJY;calJM=selJM;
      document.getElementById('si-dl').value=t.deadline;
      document.getElementById('date-txt').textContent=t.deadline;
      document.getElementById('date-btn').classList.add('sel');
    }
  }else{resetDatePicker();initCal();}
  const auid=String(t.assigned_user_id||'');
  const aname=t.assigned_to||'';
  const sel=document.getElementById('si-assigned');
  // Try matching by user_id first, then by name
  let found=false;
  for(let i=0;i<sel.options.length;i++){
    if(sel.options[i].value===auid||(auid===''&&sel.options[i].text.includes(aname))){
      sel.selectedIndex=i;found=true;break;
    }
  }
  if(!found)sel.value='';
  document.getElementById('si-reminder').value=t.reminder_at?String(t.reminder_at).slice(11,16):'';
  document.getElementById('cal-wrap').classList.remove('show');
  openSheet('task-sheet');
  setTimeout(()=>document.getElementById('si-title').focus(),300);
}

function closeTaskSheet(){
  closeSheet('task-sheet');
  editingId=null;
}

async function saveTask(){
  const title=document.getElementById('si-title').value.trim();
  if(!title){document.getElementById('si-title').focus();return;}
  const dl=document.getElementById('si-dl').value.trim();
  const aval=document.getElementById('si-assigned').value;
  const rt=document.getElementById('si-reminder').value;

  let aname='';
  if(aval){
    if(aval===MY_ID)aname=MY_NAME||'من';
    else{const u=(users||[]).find(x=>String(x.id)===aval);aname=u?u.name:'';}
  }

  const params={title,deadline:dl||'',assigned_to:aname,reminder_time:rt||'',
    assigned_user_id:aval||'',created_by_user_id:MY_ID||''};

  try{
    if(editingId!==null){
      const res=await call({action:'edit_task',id:editingId,...params});
      const idx=tasks.findIndex(t=>t.id==editingId);
      if(idx!==-1)tasks[idx]={...tasks[idx],title,deadline:dl||'',deadline_greg:res.deadline_greg||selGreg||'',
        assigned_to:aname,assigned_user_id:aval||'',reminder_at:res.reminder_at||''};
    }else{
      const nt=await call({action:'add_task',...params});
      tasks.unshift(nt);
    }
    renderTasks();closeTaskSheet();
  }catch(e){alert('خطا در ذخیره: '+e.message);}
}

// ── Habit tracker ─────────────────────────────────────────────────────
function satOfWeek(off){
  const d=new Date();
  const dow=d.getDay();// 0=Sun,6=Sat
  const dss=dow===6?0:(dow+1);
  const sat=new Date(d);sat.setDate(d.getDate()-dss+off*7);sat.setHours(0,0,0,0);
  return sat;
}
function weekDates(off){
  const sat=satOfWeek(off);
  return Array.from({length:7},(_,i)=>{const d=new Date(sat);d.setDate(sat.getDate()+i);return giso(d.getFullYear(),d.getMonth()+1,d.getDate());});
}

async function loadHabits(){
  document.getElementById('h-wrap').innerHTML='<div class="spin"></div>';
  try{
    habits=await call({action:'get_habit_list'});
    const dates=weekDates(weekOff);
    habLog=await call({action:'get_habit_week',dates:dates.join(',')}) || {};
    renderHabits();
  }catch(e){
    document.getElementById('h-wrap').innerHTML=`<div class="empty">❌ ${e.message||'خطا در بارگذاری'}<br><br><button onclick="loadHabits()" style="padding:8px 20px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-family:inherit">🔄 تلاش مجدد</button></div>`;
  }
}

function renderHabits(){
  const dates=weekDates(weekOff);
  // Week label
  const ws0=satOfWeek(weekOff),we=new Date(ws0);we.setDate(ws0.getDate()+6);
  const j0=toJ(ws0.getFullYear(),ws0.getMonth()+1,ws0.getDate());
  const j1=toJ(we.getFullYear(),we.getMonth()+1,we.getDate());
  document.getElementById('w-lbl').textContent=`${j0.jd} ${JM[j0.jm-1]} — ${j1.jd} ${JM[j1.jm-1]} ${j1.jy}`;

  if(!habits||!habits.length){
    document.getElementById('h-wrap').innerHTML='<div class="empty">هنوز عادتی ثبت نشده<br><small>با دکمه + عادت اضافه کنید</small></div>';
    return;
  }

  let html='<table class="htbl"><thead><tr><th class="hname-col">عادت</th>';
  dates.forEach((ds,i)=>{
    const{jy,jm,jd}=toJ(...ds.split('-').map(Number));
    const isTod=ds===todayStr;
    html+=`<th class="${isTod?'today-th':''}"><div>${JDN[i]}</div><div style="font-size:9px;color:var(--sub)">${jd}</div></th>`;
  });
  html+='</tr></thead><tbody>';

  habits.forEach(h=>{
    html+=`<tr><td class="hname-cell" title="${h}">${h}</td>`;
    dates.forEach((ds,i)=>{
      const done=((habLog||{})[ds]||[]).includes(h);
      const isFut=ds>todayStr;
      const isTod=ds===todayStr;
      html+=`<td><button class="hck ${done?'done':''} ${isFut?'fut':''} ${isTod&&!done?'today-cell':''}"
        onclick="toggleHab(${JSON.stringify(h)},${JSON.stringify(ds)})"></button></td>`;
    });
    html+='</tr>';
  });
  html+='</tbody></table>';
  document.getElementById('h-wrap').innerHTML=html;
}

async function toggleHab(name,ds){
  if(!habLog[ds])habLog[ds]=[];
  const idx=(habLog[ds]||[]).indexOf(name);
  if(idx>=0)habLog[ds].splice(idx,1);else habLog[ds].push(name);
  renderHabits();
  await call({action:'toggle_habit',habit_name:name,date:ds}).catch(()=>{
    if(idx>=0)habLog[ds].push(name);else{const i2=(habLog[ds]||[]).indexOf(name);if(i2>=0)habLog[ds].splice(i2,1);}
    renderHabits();
  });
}

// ── Habit sheet ───────────────────────────────────────────────────────
function openHabSheet(){
  document.getElementById('si-habit').value='';
  openSheet('hab-sheet');
  setTimeout(()=>document.getElementById('si-habit').focus(),300);
}
function closeHabSheet(){closeSheet('hab-sheet');}

async function saveHabit(){
  const name=document.getElementById('si-habit').value.trim();
  if(!name){document.getElementById('si-habit').focus();return;}
  try{
    await call({action:'add_habit',name});
    closeHabSheet();
    habits.push(name);renderHabits();
  }catch(e){alert('خطا در ذخیره: '+e.message);}
}

// ── Sheet helpers ─────────────────────────────────────────────────────
function openSheet(id){
  document.getElementById(id).classList.add('open');
  document.getElementById('overlay').classList.add('show');
}
function closeSheet(id){
  document.getElementById(id).classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// ── Navigation ────────────────────────────────────────────────────────
document.querySelectorAll('.tnb').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.tnb').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
    btn.classList.add('active');
    const pg=btn.dataset.p;
    document.getElementById(`p-${pg}`).classList.add('show');
    if(pg==='habits')loadHabits();
  };
});

document.querySelectorAll('.ftab').forEach(t=>{
  t.onclick=()=>{document.querySelectorAll('.ftab').forEach(x=>x.classList.remove('on'));t.classList.add('on');taskFilter=t.dataset.f;renderTasks();};
});

document.getElementById('t-fab').onclick=openAddTask;
document.getElementById('h-fab').onclick=openHabSheet;
document.getElementById('w-prev').onclick=()=>{weekOff--;loadHabits();};
document.getElementById('w-next').onclick=()=>{weekOff++;loadHabits();};
document.getElementById('overlay').onclick=()=>{
  document.querySelectorAll('.sheet.open').forEach(s=>s.classList.remove('open'));
  document.getElementById('overlay').classList.remove('show');
  editingId=null;
};

document.getElementById('si-title').addEventListener('keydown',e=>{if(e.key==='Enter')saveTask();});
document.getElementById('si-habit').addEventListener('keydown',e=>{if(e.key==='Enter')saveHabit();});

// ── Init ──────────────────────────────────────────────────────────────
loadTasks();
loadUsers();
initCal();
</script>
